<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PeopleMart - Affordable Shopping</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* 🔥 FULL HEIGHT FIX */
body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: linear-gradient(120deg, #e0f7fa, #80deea);
}

main {
    flex: 1;
}

/* HEADER */
header {
    background: linear-gradient(90deg, #004d40, #00695c);
    color: white;
    padding: 10px 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
}

nav ul {
    list-style: none;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

nav ul li a {
    color: white;
    text-decoration: none;
    font-size: 14px;
}

/* BANNER */
.banner {
    background: linear-gradient(90deg, #ffd740, #ffc107);
    color: #004d40;
    padding: 12px;
    text-align: center;
    font-size: 18px;
    margin: 10px; /* 🔥 reduced */
    border-radius: 10px;
}

/* CATEGORIES */
#categories {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    padding: 5px; /* 🔥 reduced */
    gap: 10px;
}

.category-item {
    width: 120px;
    background: white;
    border-radius: 8px;
    padding: 12px;
    text-align: center;
    font-weight: bold;
    border: 1px solid #ccc;
    transition: 0.3s;
}

.category-item:hover {
    transform: scale(1.05);
    background: #c8fff6;
}

/* PRODUCTS */
#featured {
    padding: 10px; /* 🔥 reduced */
}

.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px; /* 🔥 reduced */
}

/* CARD */
.product-item {
    background-color: white;
    padding: 10px; /* 🔥 reduced */
    text-align: center;
    border-radius: 10px;
    border: 1px solid #ccc;
    box-shadow: 0 3px 6px rgba(0,0,0,0.1);
}

.product-item img {
    width: 100%;
    height: 140px;
    object-fit: contain;
    padding: 2px; /* 🔥 reduced */
    border-radius: 8px;
}

.product-item p {
    margin: 6px 0;
    color: #004d40;
    font-size: 14px;
}

.product-item button {
    margin-top: 8px;
    background-color: #004d40;
    color: white;
    padding: 8px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    width: 100%;
}

.product-item button:hover {
    background-color: #00695c;
}

/* FOOTER */
footer {
    background: #004d40;
    color: white;
    text-align: center;
    padding: 10px;
}

/* MOBILE */
@media (max-width: 600px) {

    header h1 {
        font-size: 18px;
    }

    .banner {
        font-size: 16px;
    }

    .category-item {
        width: 100%;
    }

    nav ul {
        justify-content: center;
    }
}
</style>
</head>

<body>

<header>
    <h1>PeopleMart</h1>
    <nav>
        <ul>
            <li><a href="homepagee.html">Home</a></li>
            <li><a href="categories.html">Categories</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="order.html">Orders</a></li>
        </ul>
    </nav>
</header>

<main>

<section class="banner">
    Big Savings on Groceries and Essentials!
</section>

<section id="categories">
    <a href="groceries.html" class="category-item">Groceries</a>
    <a href="clothing.html" class="category-item">Clothing</a>
    <a href="electronics.html" class="category-item">Electronics</a>
    <a href="home and kitchen.html" class="category-item">Home & Kitchen</a>
</section>

<section id="featured">
    <h2 style="text-align:center; color:#004d40;">Popular Deals</h2>

    <div class="product-grid">

        <div class="product-item">
            <img src="https://th.bing.com/th/id/OIP.wmQ-rkoa1v_c5pFTIPMR8QHaFa">
            <p>Rolex Men's Watch</p>
            <p>₹50,000</p>
            <button onclick="addToCart('Rolex Watch', 50000)">Add to Cart</button>
        </div>

        <div class="product-item">
            <img src="https://www.rollingstone.com/wp-content/uploads/2022/09/Apple-AirPods-Pro-2nd-gen-hero-220907.jpg">
            <p>OnePlus Earbuds</p>
            <p>₹999</p>
            <button onclick="addToCart('Earbuds', 999)">Add to Cart</button>
        </div>

        <div class="product-item">
            <img src="https://cdn1.smartprix.com/rx-i5n1dTTOB-w1200-h1200/5n1dTTOB.jpg">
            <p>iPhone 16 Pro</p>
            <p>₹100,000</p>
            <button onclick="addToCart('iPhone', 100000)">Add to Cart</button>
        </div>

    </div>
</section>

</main>

<footer>
    &copy; 2024 PeopleMart. All rights reserved.
</footer>

<script>
function addToCart(name, price) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.push({ name, price });
    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Item added to cart!");
}
</script>

</body>
</html>
