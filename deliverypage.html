<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeopleMart - Checkout</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        :root {
            --dark-green: #014122;
            --light-green: #026b3d;
            --white: #ffffff;
            --gray: #d5d5d5;
            --card-bg: #ffffff15;
        }

        body {
            background: linear-gradient(135deg, #014122, #026b3d);
            color: var(--white);
            padding-bottom: 40px;
        }

        header {
            text-align: center;
            padding: 25px 10px;
            font-size: 26px;
            font-weight: bold;
            border-bottom: 2px solid var(--white);
        }

        /* Main Layout */
        main {
            width: 90%;
            max-width: 850px;
            margin: 25px auto;
            background-color: rgba(255,255,255,0.08);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        h2 {
            margin-bottom: 10px;
            font-size: 22px;
        }

        /* Order Summary */
        .order-summary {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 1px solid var(--gray);
        }

        .cart-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 12px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 8px;
        }

        .cart-item img {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            margin-right: 15px;
        }

        .cart-details p {
            margin: 3px 0;
        }

        .total-box {
            margin-top: 10px;
            padding: 10px;
            background-color: rgba(255,255,255,0.15);
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
        }

        /* Form */
        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--gray);
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 11px;
            border: 1px solid var(--gray);
            border-radius: 6px;
            background-color: rgba(255,255,255,0.1);
            color: var(--white);
            font-size: 16px;
        }

        input::placeholder {
            color: #cccccc;
        }

        /* Button */
        #submit-button {
            width: 100%;
            padding: 15px;
            background-color: var(--white);
            color: var(--dark-green);
            border: none;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #submit-button:hover {
            background-color: var(--gray);
        }

        footer {
            text-align: center;
            color: var(--white);
            margin-top: 20px;
            padding: 10px;
        }
    </style>
</head>
<body>

<header>Checkout</header>

<main>

    <!-- Order Summary -->
    <div class="order-summary">
        <h2>Your Items</h2>
        <div id="itemList"></div>
        <div class="total-box" id="totalAmountBox">Total: ₹0</div>
    </div>

    <!-- Delivery Form -->
    <form id="checkout-form">
        <h2>Delivery Details</h2>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" >
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" >
        </div>

        <h2>Address</h2>

        <div class="form-group">
            <label>Address</label>
            <input type="text" id="address" >
        </div>

        <div class="form-group">
            <label>City</label>
            <input type="text" id="city" >
        </div>

        <div class="form-group">
            <label>State</label>
            <input type="text" id="state" >
        </div>

        <div class="form-group">
            <label>Zip Code</label>
            <input type="text" id="zip" >
        </div>

        <h2>Payment</h2>

        <div class="form-group">
            <label>Card Number</label>
            <input type="text" id="cardNumber" maxlength="16"  required>
        </div>

        <div class="form-group">
            <label>Expiry Date</label>
            <input type="month" id="expiryDate" required>
        </div>

        <div class="form-group">
            <label>CVV</label>
            <input type="text" id="cvv" maxlength="3" \>
        </div>

        <button type="button" id="submit-button" onclick="placeOrder()">Place Order</button>
    </form>

</main>

<footer>
    &copy; 2024 PeopleMart. All rights reserved.
</footer>

<script>
    // Load cart items and display them
    function loadCartItems() {
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let list = document.getElementById("itemList");
        let total = 0;

        list.innerHTML = "";

        cart.forEach(item => {
            total += item.price;

            list.innerHTML += `
                <div class="cart-item">
                    <img src="${item.img}">
                    <div class="cart-details">
                        <p><strong>${item.name}</strong></p>
                        <p>Price: ₹${item.price}</p>
                        <p>Quantity: 1</p>
                    </div>
                </div>
            `;
        });

        document.getElementById("totalAmountBox").innerText = "Total: ₹" + total;
    }

    // Validation + store order
    function placeOrder() {
        const fields = document.querySelectorAll("#checkout-form input");
        let missing = [];

        fields.forEach(f => {
            if (!f.value.trim()) missing.push(f.previousElementSibling.textContent);
        });

        if (missing.length > 0) {
            alert("Please fill: " + missing.join(", "));
            return;
        }

        alert("Order placed successfully!");

        localStorage.removeItem("cart");

        window.location.href = "deliverysuccessfull.html";
    }

    window.onload = loadCartItems;
</script>

</body>
</html>
