<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groceries - PeopleMart</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* Header */
        header {
            background-color: #004d40;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 15px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
        }

        /* Section */
        .groceries-section {
            padding: 20px;
            text-align: center;
        }

        .groceries-section h2 {
            color: #004d40;
            margin-bottom: 20px;
        }

        .grocery-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Card */
        .grocery-item {
            width: 220px;
            height: 320px;
            background-color: #f9f9f9;
            margin: 10px;
            padding: 15px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;

            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .grocery-item:hover {
            transform: scale(1.05);
        }

        /* 🔥 FIXED IMAGE STYLE */
        .grocery-item img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .grocery-item h3 {
            color: #004d40;
            font-size: 16px;
        }

        .grocery-item p {
            color: #555;
        }

        .add-to-cart-btn {
            background-color: #ff5722;
            color: white;
            padding: 8px;
            border: none;
            cursor: pointer;
        }

        .add-to-cart-btn:hover {
            background-color: #e64a19;
        }

        footer {
            background-color: #004d40;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>
    <h1>PeopleMart</h1>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="categories.html">Categories</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="order.html">Orders</a></li>
        </ul>
    </nav>
</header>

<section class="groceries-section">
    <h2>Groceries</h2>

    <div class="grocery-grid">

        <div class="grocery-item">
            <img src="https://images.unsplash.com/photo-1586201375761-83865001e31c">
            <h3>Rice - 1kg</h3>
            <p>₹45</p>
            <button class="add-to-cart-btn">Add to Cart</button>
        </div>

        <div class="grocery-item">
            <img src="https://images.unsplash.com/photo-1587734195503-904fca47e0e9">
            <h3>Sugar - 1kg</h3>
            <p>₹35</p>
            <button class="add-to-cart-btn">Add to Cart</button>
        </div>

        <div class="grocery-item">
            <img src="https://images.unsplash.com/photo-1604908176997-43128e7e6c53">
            <h3>Cooking Oil - 1L</h3>
            <p>₹120</p>
            <button class="add-to-cart-btn">Add to Cart</button>
        </div>

        <div class="grocery-item">
            <img src="https://images.unsplash.com/photo-1592928302636-c83cf1e1c887">
            <h3>Dal - 1kg</h3>
            <p>₹80</p>
            <button class="add-to-cart-btn">Add to Cart</button>
        </div>

        <div class="grocery-item">
            <img src="https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2">
            <h3>Tea Powder - 500g</h3>
            <p>₹150</p>
            <button class="add-to-cart-btn">Add to Cart</button>
        </div>

        <div class="grocery-item">
            <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b">
            <h3>Milk - 500ml</h3>
            <p>₹50</p>
            <button class="add-to-cart-btn">Add to Cart</button>
        </div>

    </div>
</section>

<footer>
    <p>&copy; 2024 PeopleMart. All rights reserved.</p>
</footer>

</body>
</html>
