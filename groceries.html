<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* Header */
        header {
            background-color: #004d40;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 15px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
        }

        /* Section */
        .groceries-section {
            padding: 20px;
            text-align: center;
        }

        .groceries-section h2 {
            color: #004d40;
            margin-bottom: 20px;
        }

        .grocery-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Card */
        .grocery-item {
            width: 220px;
            height: 320px;
            background-color: #f9f9f9;
            margin: 10px;
            padding: 15px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;

            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .grocery-item:hover {
            transform: scale(1.05);
        }

        /* 🔥 FIXED IMAGE STYLE */
        .grocery-item img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .grocery-item h3 {
            color: #004d40;
            font-size: 16px;
        }

        .grocery-item p {
            color: #555;
        }

        .add-to-cart-btn {
            background-color: #ff5722;
            color: white;
            padding: 8px;
            border: none;
            cursor: pointer;
        }

        .add-to-cart-btn:hover {
            background-color: #e64a19;
        }

        footer {
            background-color: #004d40;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
